databases:
  - name: hr-leave-db
    plan: free
    databaseName: hr_leave
    user: hr_leave_user

services:
  - type: web
    name: hr-leave-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/utils/health-check/
    dockerCommand: bash scripts/render-start.sh
    envVars:
      - key: PROJECT_NAME
        value: HR Leave Management
      - key: ENVIRONMENT
        value: local
      - key: SECRET_KEY
        generateValue: true
      - key: FIRST_SUPERUSER
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false
      - key: FRONTEND_HOST
        value: https://hr-leave-frontend.onrender.com
      - key: BACKEND_CORS_ORIGINS
        value: https://hr-leave-frontend.onrender.com
      # Forgot/reset-password email, via Resend's SMTP relay (resend.com) -
      # free tier covers course-project volume, no backend code changes
      # needed. Sign up, generate an API key, and set SMTP_PASSWORD to it in
      # the Render dashboard (kept out of this file since it's a secret).
      # Swap EMAILS_FROM_EMAIL to a verified sending domain once you have
      # one - resend.dev's sandbox address only works for Resend's own
      # test/dev mode, not arbitrary recipients.
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM_EMAIL
        value: onboarding@resend.dev
      - key: EMAILS_FROM_NAME
        value: HR Leave Management
      - key: POSTGRES_SERVER
        fromDatabase:
          name: hr-leave-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: hr-leave-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: hr-leave-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: hr-leave-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: hr-leave-db
          property: database

  - type: web
    name: hr-leave-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hr-leave-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
